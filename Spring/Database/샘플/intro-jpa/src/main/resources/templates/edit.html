<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자기소개서 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container py-5" style="max-width: 720px">

    <h1 class="mb-4">📝 자기소개서 수정</h1>

    <!--
      작성 폼(form.html)과 거의 같지만 두 가지가 다릅니다.
      ① th:action이 /intro/{id}/edit 으로 향합니다 (몇 번 글을 고칠지 URL에 담음)
      ② th:value / th:text 로 "기존에 저장된 값"을 미리 채워서 보여줍니다
    -->
    <form th:action="@{/intro/{id}/edit(id=${intro.id})}" method="post">

        <div class="mb-3">
            <label for="name" class="form-label">이름</label>
            <input type="text" class="form-control" id="name" name="name"
                   th:value="${intro.name}" maxlength="50" required>
        </div>

        <div class="mb-3">
            <label for="title" class="form-label">제목</label>
            <input type="text" class="form-control" id="title" name="title"
                   th:value="${intro.title}" maxlength="200" required>
        </div>

        <div class="mb-3">
            <label for="content" class="form-label">자기소개</label>
            <!-- textarea는 value 속성이 없어서 th:text로 내용을 채웁니다 -->
            <textarea class="form-control" id="content" name="content" rows="10"
                      maxlength="4000" required th:text="${intro.content}"></textarea>
        </div>

        <button type="submit" class="btn btn-primary">수정 완료</button>
        <a th:href="@{/intro/{id}(id=${intro.id})}" class="btn btn-outline-secondary">취소</a>
    </form>

</div>
</body>
</html>
