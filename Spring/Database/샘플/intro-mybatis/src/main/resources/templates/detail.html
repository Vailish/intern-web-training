<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자기소개서 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container py-5" style="max-width: 720px">

    <!-- 컨트롤러가 Model에 담아 보낸 intro 객체의 값을 th:text로 출력합니다 -->
    <h1 class="mb-1" th:text="${intro.title}">제목 예시</h1>
    <p class="text-secondary mb-4">
        <span th:text="${intro.name}">홍길동</span> ·
        <span th:text="${#temporals.format(intro.createdAt, 'yyyy-MM-dd HH:mm')}">2026-07-06 10:00</span>
    </p>

    <div class="card">
        <!-- content-box 클래스: 줄바꿈을 그대로 보여주기 위한 스타일 (style.css) -->
        <div class="card-body content-box" th:text="${intro.content}">
            자기소개 내용 예시입니다.
        </div>
    </div>

    <!-- 목록/수정은 링크(GET), 삭제는 폼 전송(POST)입니다.
         "그냥 링크로 지우면 안 되나?" → 데이터를 바꾸는 요청은 GET으로 만들면 안 됩니다.
         (검색엔진·브라우저가 링크를 미리 눌러보기만 해도 글이 지워져 버립니다!) -->
    <div class="d-flex gap-2 mt-4">
        <a th:href="@{/}" class="btn btn-outline-secondary">← 목록으로</a>
        <a th:href="@{/intro/{id}/edit(id=${intro.id})}" class="btn btn-outline-primary">수정</a>
        <form th:action="@{/intro/{id}/delete(id=${intro.id})}" method="post"
              onsubmit="return confirm('정말 삭제할까요? 되돌릴 수 없습니다.');">
            <button type="submit" class="btn btn-outline-danger">삭제</button>
        </form>
    </div>

</div>
</body>
</html>
