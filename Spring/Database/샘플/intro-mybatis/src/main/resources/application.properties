# 애플리케이션 이름
spring.application.name=intro-mybatis

# =====================================================================
# 기본 프로필: H2 데이터베이스 (파일 모드)
# MySQL로 실행하려면 application-mysql.properties 를 보세요.
#   실행: .\gradlew.bat bootRun --args='--spring.profiles.active=mysql'
# =====================================================================

# ===== H2 데이터베이스 (파일 모드) =====
# 드라이버 클래스는 적지 않습니다. 스프링부트가 URL(jdbc:h2:)을 보고 알아서 고릅니다.
spring.datasource.url=jdbc:h2:./data/introdb
spring.datasource.username=sa
spring.datasource.password=

# ===== H2 웹 콘솔 =====
# 브라우저에서 http://localhost:8080/h2-console 로 DB 내용을 직접 볼 수 있습니다.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== 테이블 생성 (schema.sql) =====
# JPA의 ddl-auto=update가 없으므로, 시작할 때 schema.sql을 실행해 테이블을 만듭니다.
# DDL에 IF NOT EXISTS가 있어서 매번 실행해도 안전하고, 데이터는 유지됩니다.
spring.sql.init.mode=always

# ===== MyBatis =====
# 매퍼 XML 파일들의 위치
mybatis.mapper-locations=classpath:mapper/*.xml
# DB의 밑줄표기(created_at)를 자바의 낙타표기(createdAt) 필드에 자동 연결
# (JPA는 기본 동작이었지만, MyBatis에서는 이 한 줄을 켜야 합니다!)
mybatis.configuration.map-underscore-to-camel-case=true

# ===== SQL 로그 =====
# 매퍼가 실행하는 SQL과 바인딩 값을 콘솔에 보여줍니다. (JPA의 show-sql에 해당)
logging.level.com.example.intromybatis.mapper=trace
