<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>외부 API 날씨 조회</title>
    <!-- Bootstrap CDN (기존 intro 앱과 동일하게 화면을 꾸미는 용도) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 640px;">

    <h1 class="h3 mb-1">🌤️ 도시 날씨 조회</h1>
    <p class="text-muted mb-4">
        스프링부트가 외부 API(Open-Meteo)를 호출해 받아 온 실시간 날씨입니다.
    </p>

    <!-- 검색 폼: GET / 로 city 파라미터를 보냅니다 (예: /?city=Seoul) -->
    <form method="get" th:action="@{/}" class="mb-4">
        <div class="input-group">
            <input type="text" name="city" class="form-control"
                   placeholder="영문 도시명 입력 (예: Seoul, Busan, Tokyo)"
                   th:value="${city}" autofocus>
            <button type="submit" class="btn btn-primary">조회</button>
        </div>
        <div class="form-text">※ 지오코딩 API 특성상 <b>영문</b>으로 입력해야 잘 찾습니다.</div>
    </form>

    <!-- 에러가 있으면 빨간 안내 박스 -->
    <div th:if="${error}" class="alert alert-warning" role="alert" th:text="${error}"></div>

    <!-- 날씨 결과가 있으면 카드로 표시 -->
    <div th:if="${weather}" class="card shadow-sm">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <h2 class="h4 mb-0" th:text="${weather.cityName}">도시</h2>
                    <div class="text-muted" th:text="${weather.country}">나라</div>
                </div>
                <div class="text-end">
                    <div style="font-size: 3rem; line-height: 1;" th:text="${weather.emoji}">🌤️</div>
                    <div th:text="${weather.description}">날씨</div>
                </div>
            </div>

            <hr>

            <div class="row text-center">
                <div class="col">
                    <div class="text-muted small">기온</div>
                    <div class="fs-4 fw-bold">
                        <span th:text="${weather.temperature}">0</span>℃
                    </div>
                </div>
                <div class="col">
                    <div class="text-muted small">습도</div>
                    <div class="fs-4 fw-bold">
                        <span th:text="${weather.humidity}">0</span>%
                    </div>
                </div>
                <div class="col">
                    <div class="text-muted small">풍속</div>
                    <div class="fs-4 fw-bold">
                        <span th:text="${weather.windSpeed}">0</span>
                        <span class="fs-6 fw-normal">km/h</span>
                    </div>
                </div>
            </div>

            <hr>

            <div class="text-muted small">
                관측 시각: <span th:text="${weather.observedAt}">-</span>
                (<span th:text="${weather.timezone}">-</span>)
            </div>
        </div>
    </div>

    <p class="text-muted small mt-4 mb-0">
        데이터 제공: Open-Meteo (https://open-meteo.com) · API 키 없이 사용
    </p>
</div>
</body>
</html>
