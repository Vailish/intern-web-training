spring.application.name=auth-jwt-refresh

# --- JWT / 토큰 설정 ---
# 서명 비밀키 (HMAC 최소 32바이트). 실제 서비스에선 환경변수로 주입!
jwt.secret=this-is-a-demo-secret-key-please-change-in-production-1234567890

# 액세스 토큰 수명(초). 데모에서 "만료 → 리프레시" 흐름을 금방 볼 수 있도록 짧게 60초로 둡니다.
# (실무에서는 보통 15~30분 정도를 씁니다.)
jwt.access-token-validity-seconds=60

# 리프레시 토큰 수명(일). 액세스보다 훨씬 깁니다.
jwt.refresh-token-validity-days=14

# --- 데이터베이스: 인메모리 H2 ---
# member(회원)와 refresh_token(리프레시 토큰) 두 테이블이 만들어집니다.
spring.datasource.url=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# logging.level.org.springframework.security=DEBUG
