spring.application.name=auth-jwt

# --- JWT 설정 ---
# 토큰 서명에 쓰는 비밀키. HS256 은 최소 32바이트(256비트) 이상이어야 합니다.
# ⚠️ 실제 서비스에서는 이렇게 소스에 적지 않고 환경변수/시크릿 저장소에서 주입합니다.
jwt.secret=this-is-a-demo-secret-key-please-change-in-production-1234567890
# 토큰 유효 시간(분). 지나면 검증에 실패합니다.
jwt.expiration-minutes=30

# --- 데이터베이스: 인메모리 H2 ---
spring.datasource.url=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# 인증 과정을 자세히 보고 싶으면 주석 해제
# logging.level.org.springframework.security=DEBUG
