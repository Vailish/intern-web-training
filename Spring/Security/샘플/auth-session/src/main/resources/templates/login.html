<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container" style="max-width: 420px;">
    <div class="py-5">
        <h1 class="h3 mb-4">로그인</h1>

        <!-- 로그인 실패 시 SecurityConfig의 failureUrl(/login?error) 로 돌아옵니다. -->
        <div th:if="${param.error}" class="alert alert-danger">
            아이디 또는 비밀번호가 올바르지 않습니다.
        </div>
        <!-- 회원가입 직후 안내 -->
        <div th:if="${param.registered}" class="alert alert-success">
            회원가입이 완료되었습니다. 로그인해 주세요.
        </div>
        <!-- 로그아웃 직후 안내 -->
        <div th:if="${param.logout}" class="alert alert-info">
            로그아웃되었습니다.
        </div>

        <!-- action 을 /login 으로 POST → SecurityConfig.loginProcessingUrl 이 처리.
             input 의 name 은 반드시 username / password 여야 Security가 알아봅니다.
             (th:action 이므로 CSRF 토큰은 자동으로 추가됩니다) -->
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">아이디</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">비밀번호</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">로그인</button>
        </form>

        <div class="mt-3 text-center">
            <a href="/signup">회원가입</a> · <a href="/">홈으로</a>
        </div>
    </div>
</div>
</body>
</html>
