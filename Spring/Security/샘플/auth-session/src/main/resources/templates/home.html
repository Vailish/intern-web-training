<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>세션 인증 데모</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container" style="max-width: 720px;">
    <div class="py-5">
        <h1 class="mb-4">🔐 세션 방식 로그인 데모</h1>

        <!-- 로그인한 경우: username 모델값이 존재 -->
        <div th:if="${username}" class="alert alert-success">
            <strong th:text="${username}">아이디</strong> 님으로 로그인되어 있습니다.
        </div>
        <!-- 로그인하지 않은 경우 -->
        <div th:unless="${username}" class="alert alert-secondary">
            로그인하지 않은 상태입니다.
        </div>

        <div class="d-flex gap-2 flex-wrap mb-4">
            <!-- 비로그인 상태에서 보여 줄 버튼 -->
            <a th:unless="${username}" href="/login" class="btn btn-primary">로그인</a>
            <a th:unless="${username}" href="/signup" class="btn btn-outline-primary">회원가입</a>

            <!-- 로그인 상태에서 보여 줄 버튼 -->
            <a th:if="${username}" href="/mypage" class="btn btn-primary">마이페이지 (로그인 필요)</a>
            <a th:if="${username}" href="/admin" class="btn btn-warning">관리자 페이지 (ADMIN 전용)</a>
            <!-- 로그아웃은 CSRF 보호 때문에 POST 로 보내야 합니다. th:action 을 쓰면
                 Spring Security가 CSRF 토큰을 자동으로 폼에 넣어 줍니다. -->
            <form th:if="${username}" th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-danger">로그아웃</button>
            </form>
        </div>

        <div class="card">
            <div class="card-body">
                <h5 class="card-title">실습 계정</h5>
                <ul class="mb-0">
                    <li><code>admin</code> / <code>admin123</code> → 관리자 (모든 페이지 접근)</li>
                    <li><code>user</code> / <code>user123</code> → 일반 회원 (관리자 페이지 접근 시 거부)</li>
                </ul>
            </div>
        </div>
    </div>
</div>
</body>
</html>
