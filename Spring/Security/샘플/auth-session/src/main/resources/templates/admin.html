<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>관리자 페이지</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container" style="max-width: 720px;">
    <div class="py-5">
        <h1 class="h3 mb-4">관리자 페이지</h1>
        <div class="alert alert-warning">
            이 페이지는 <strong>ADMIN 권한</strong>을 가진 사람만 볼 수 있습니다.
            현재 로그인: <strong th:text="${username}">아이디</strong>
        </div>
        <p class="text-muted">
            일반 회원(user)으로 로그인한 뒤 이 주소로 접근하면 <code>403 Forbidden</code>(접근 거부)이 뜹니다.
            권한이 없다는 뜻입니다.
        </p>
        <a href="/" class="btn btn-outline-secondary">홈으로</a>
    </div>
</div>
</body>
</html>
