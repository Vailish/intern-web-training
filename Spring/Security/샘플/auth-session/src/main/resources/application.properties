spring.application.name=auth-session

# --- 데이터베이스: 인메모리 H2 ---
# 세션/인증 데모라서 데이터를 파일로 남길 필요가 없습니다.
# 앱을 끄면 회원 데이터가 사라지고, 다시 켜면 DataInitializer 가 실습 계정을 다시 넣습니다.
spring.datasource.url=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

# 엔티티에 맞춰 테이블 자동 생성
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 브라우저에서 http://localhost:8080/h2-console 로 회원 테이블 확인 가능
# (JDBC URL 칸에 위의 spring.datasource.url 값을 그대로 입력)
spring.h2.console.enabled=true

# 로그인/인증 과정에서 무슨 일이 일어나는지 보고 싶으면 아래 주석을 해제하세요.
# logging.level.org.springframework.security=DEBUG
