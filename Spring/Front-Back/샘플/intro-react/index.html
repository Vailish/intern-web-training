<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>인턴 자기소개서 (React)</title>
    <!-- 여러분이 배운 Bootstrap을 그대로 씁니다 (intro-jpa의 화면과 동일) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <!--
      SPA(Single Page Application)의 비밀이 이 파일에 있습니다.
      HTML은 이 파일 "단 하나"뿐이고, 내용은 비어 있는 div 하나가 전부입니다!

      intro-jpa에서는 서버가 list.html, detail.html... 을 각각 만들어 줬지만,
      React에서는 아래 div#root 안에 JavaScript가 모든 화면을 그려 넣습니다.
      화면 전환도 "새 HTML을 받아오는 것"이 아니라 "JS가 내용을 갈아끼우는 것"입니다.
    -->
    <div id="root"></div>

    <!-- React 앱의 시작점. 여기서부터 src/main.jsx → App.jsx 순서로 이어집니다 -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
