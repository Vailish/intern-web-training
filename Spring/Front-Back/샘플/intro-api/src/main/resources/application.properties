# 애플리케이션 이름
spring.application.name=intro-api

# =====================================================================
# 기본 프로필: H2 데이터베이스 (파일 모드) — intro-jpa와 동일한 설정입니다.
# MySQL로 실행하려면 application-mysql.properties 를 보세요.
#   실행: .\gradlew.bat bootRun --args='--spring.profiles.active=mysql'
# =====================================================================

# ===== H2 데이터베이스 (파일 모드) =====
# 프로젝트 폴더 아래 data/introdb 파일에 데이터를 저장합니다.
# 드라이버 클래스는 적지 않습니다. 스프링부트가 URL(jdbc:h2:)을 보고 알아서 고릅니다.
# (여기에 org.h2.Driver를 적어버리면 mysql 프로필에도 상속되어 접속이 깨집니다!)
spring.datasource.url=jdbc:h2:./data/introdb
spring.datasource.username=sa
spring.datasource.password=

# ===== H2 웹 콘솔 =====
# 브라우저에서 http://localhost:8080/h2-console 로 DB 내용을 직접 볼 수 있습니다.
# 접속할 때 JDBC URL에 위와 똑같이 jdbc:h2:./data/introdb 를 입력하세요.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== JPA =====
# update: 엔티티 클래스에 맞춰 테이블을 자동으로 만들고, 기존 데이터는 유지합니다.
spring.jpa.hibernate.ddl-auto=update

# 콘솔에 실행되는 SQL을 보여줍니다. JPA가 만든 SQL을 눈으로 확인해 보세요.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
