# =====================================================================
# mysql 프로필: 도커로 띄운 MySQL 서버에 접속합니다.
# (DB 교육 05 문서에서 만든 intern-mysql 컨테이너 + intern 계정을 그대로 사용)
#
# 실행 방법:
#   .\gradlew.bat bootRun --args='--spring.profiles.active=mysql'
#
# 이 파일에는 "기본 설정과 달라지는 부분"만 적으면 됩니다.
# 나머지(show-sql 등)는 application.properties 값이 그대로 유지됩니다.
# =====================================================================

# ===== MySQL 접속 정보 (DB 교육 02에서 배운 접속 5요소!) =====
# 도커를 3307 포트로 띄웠다면 localhost:3307 로 바꾸세요.
spring.datasource.url=jdbc:mysql://localhost:3306/introdb
spring.datasource.username=intern
spring.datasource.password=intern1234

# 드라이버 클래스는 따로 적지 않아도 됩니다.
# 스프링부트가 URL의 jdbc:mysql:// 을 보고 MySQL 드라이버를 알아서 고릅니다.

# ===== JPA =====
# validate: 테이블을 만들거나 고치지 않고, 엔티티와 테이블이 맞는지 "검사만" 합니다.
# intern 계정에는 DDL 권한이 없고(최소 권한 원칙!), 테이블은 관리자(root)가
# 이미 만들어 두었기 때문입니다. → DB 교육 05 문서 3-2절
spring.jpa.hibernate.ddl-auto=validate
