<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>실시간 채팅 예제</title>
	<!-- Bootstrap: 지금까지 쓰던 것과 동일한 CDN 방식 (인터넷 연결 필요) -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
		/* 채팅 말풍선을 위/아래로 쌓고 스크롤되게 하는 영역 */
		#messages { height: 60vh; overflow-y: auto; background: #f8f9fa; }
		/* 내 메시지는 오른쪽 파란색, 남의 메시지는 왼쪽 흰색 */
		.bubble { max-width: 75%; padding: .5rem .75rem; border-radius: .75rem; }
		.mine { background: #0d6efd; color: #fff; }
		.other { background: #fff; border: 1px solid #dee2e6; }
		/* 입장/퇴장 같은 시스템 안내는 가운데 회색 글씨 */
		.system { color: #6c757d; font-size: .85rem; }
	</style>
</head>
<body class="bg-light">
<div class="container py-4" style="max-width: 640px;">
	<h3 class="mb-3">💬 실시간 채팅</h3>

	<!-- (1) 입장 화면: 닉네임을 입력하고 들어갑니다 -->
	<div id="joinBox" class="card shadow-sm">
		<div class="card-body">
			<label class="form-label">닉네임을 입력하세요</label>
			<div class="input-group">
				<input id="nicknameInput" type="text" class="form-control" placeholder="예: 철수" maxlength="20">
				<button id="joinButton" class="btn btn-primary">입장</button>
			</div>
			<div class="form-text">같은 화면을 두 개 열어 서로 다른 닉네임으로 입장하면 실시간 대화를 확인할 수 있습니다.</div>
		</div>
	</div>

	<!-- (2) 채팅 화면: 입장 후에 나타납니다 -->
	<div id="chatBox" class="card shadow-sm d-none">
		<div class="card-header d-flex justify-content-between align-items-center">
			<span><strong id="myName"></strong> 님으로 접속</span>
			<span class="badge bg-secondary" id="userCount">0명 접속중</span>
		</div>
		<div id="messages" class="card-body d-flex flex-column gap-2"></div>
		<div class="card-footer">
			<div class="input-group">
				<input id="messageInput" type="text" class="form-control" placeholder="메시지를 입력하세요" autocomplete="off">
				<button id="sendButton" class="btn btn-primary">전송</button>
			</div>
		</div>
	</div>
</div>

<script>
	// ─────────────────────────────────────────────────────────────
	//  이 파일에는 프레임워크가 없습니다. 브라우저에 기본 내장된 WebSocket 만 씁니다.
	//  "fetch 는 한 번 묻고 답을 받으면 끝. WebSocket 은 통로를 계속 열어 둔다" 로 기억하세요.
	// ─────────────────────────────────────────────────────────────

	// 자주 쓰는 화면 요소들을 미리 붙잡아 둡니다.
	const joinBox = document.getElementById('joinBox');
	const chatBox = document.getElementById('chatBox');
	const nicknameInput = document.getElementById('nicknameInput');
	const joinButton = document.getElementById('joinButton');
	const messages = document.getElementById('messages');
	const messageInput = document.getElementById('messageInput');
	const sendButton = document.getElementById('sendButton');
	const myNameLabel = document.getElementById('myName');
	const userCountLabel = document.getElementById('userCount');

	let socket = null;   // 서버와 연결된 통로. 입장할 때 만들어집니다.
	let myName = '';     // 내 닉네임. 내 메시지를 오른쪽에 그리기 위해 기억해 둡니다.

	// [입장] 버튼을 누르면 실행됩니다.
	function join() {
		const nickname = nicknameInput.value.trim();
		if (!nickname) {
			alert('닉네임을 입력하세요.');
			return;
		}
		myName = nickname;

		// 핵심 한 줄: 서버로 WebSocket 통로를 엽니다.
		//  - location.host 는 지금 접속한 주소(localhost:8080)입니다.
		//  - http 는 ws 로, https 는 wss 로 바뀌는 것이 규칙입니다. (여기선 ws)
		//  - "/ws/chat" 은 서버의 WebSocketConfig 에 등록한 주소와 똑같아야 합니다.
		const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
		socket = new WebSocket(protocol + '://' + location.host + '/ws/chat');

		// (a) 통로가 열리면 호출됩니다 → 곧바로 "입장(ENTER)" 메시지를 보냅니다.
		socket.onopen = function () {
			sendToServer({ type: 'ENTER', sender: myName, content: '' });

			// 화면을 입장 화면 → 채팅 화면으로 전환합니다.
			joinBox.classList.add('d-none');
			chatBox.classList.remove('d-none');
			myNameLabel.textContent = myName;
			messageInput.focus();
		};

		// (b) 서버가 메시지를 보낼 때마다 호출됩니다 → 화면에 그립니다.
		//     fetch 와 가장 다른 점: 내가 요청하지 않아도 서버가 먼저 말을 겁니다.
		socket.onmessage = function (event) {
			const message = JSON.parse(event.data); // 서버가 보낸 JSON 문자열 → 객체
			renderMessage(message);
			userCountLabel.textContent = message.userCount + '명 접속중';
		};

		// (c) 통로가 닫히면(서버 중단 등) 호출됩니다.
		socket.onclose = function () {
			renderSystem('연결이 종료되었습니다.');
		};

		// (d) 오류가 나면 호출됩니다.
		socket.onerror = function () {
			renderSystem('연결 오류가 발생했습니다.');
		};
	}

	// [전송] 버튼 또는 Enter → 대화(TALK) 메시지를 서버로 보냅니다.
	function sendMessage() {
		const content = messageInput.value.trim();
		if (!content) return;
		sendToServer({ type: 'TALK', sender: myName, content: content });
		messageInput.value = '';
		messageInput.focus();
	}

	// 객체를 JSON 문자열로 바꿔서 통로에 흘려보냅니다. (서버가 ChatMessage 로 받습니다)
	function sendToServer(messageObject) {
		socket.send(JSON.stringify(messageObject));
	}

	// 받은 메시지 한 건을 화면에 그립니다.
	function renderMessage(message) {
		// 입장/퇴장 안내는 가운데 회색 글씨로
		if (message.type === 'ENTER' || message.type === 'LEAVE') {
			renderSystem(message.content);
			return;
		}
		// 일반 대화는 말풍선으로. 내가 보낸 것이면 오른쪽/파란색, 아니면 왼쪽/흰색.
		const isMine = message.sender === myName;
		const row = document.createElement('div');
		row.className = 'd-flex flex-column ' + (isMine ? 'align-items-end' : 'align-items-start');
		row.innerHTML =
			'<small class="text-muted">' + escapeHtml(message.sender) + '</small>' +
			'<div class="bubble ' + (isMine ? 'mine' : 'other') + '">' + escapeHtml(message.content) + '</div>';
		messages.appendChild(row);
		scrollToBottom();
	}

	// 시스템 안내(입장/퇴장/연결오류)를 가운데에 그립니다.
	function renderSystem(text) {
		const row = document.createElement('div');
		row.className = 'text-center system';
		row.textContent = text;
		messages.appendChild(row);
		scrollToBottom();
	}

	// 새 메시지가 오면 항상 맨 아래로 스크롤
	function scrollToBottom() {
		messages.scrollTop = messages.scrollHeight;
	}

	// 보안 기본기: 사용자가 입력한 글자를 그대로 HTML 로 넣으면 안 됩니다(XSS).
	// <, >, & 같은 특수문자를 무해한 표시용 문자로 바꿔 줍니다.
	function escapeHtml(text) {
		const div = document.createElement('div');
		div.textContent = text;
		return div.innerHTML;
	}

	// 버튼/엔터 키에 위 함수들을 연결합니다.
	joinButton.addEventListener('click', join);
	nicknameInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') join(); });
	sendButton.addEventListener('click', sendMessage);
	messageInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
